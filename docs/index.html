<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Zerp - Genesis</title>
    <style>
        html {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			background-color: #000;
			display: grid;
			place-items: center; 
		}

		body {
			margin: 0;
			padding: 0;
			aspect-ratio: 4 / 3;
			width: auto;
			height: 100%;
			background-color: #000;
			overflow: hidden;
			max-width: 100%;
			max-height: 100%;
			image-rendering: -moz-crisp-edges;
			image-rendering: -webkit-crisp-edges;
			image-rendering: pixelated;
			image-rendering: crisp-edges;
		}
    </style>
	<link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <script src="Genesis.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
	<span style="font-family: Arial, sans-serif; color: white; font-weight: bold;">D-PAD - arrow keys&emsp;START - Enter&emsp;A, B, C - Z, X, C</span>
    <script>
        const romUrl = "rom.bin"; 
		function isMobileDevice() {
        return !!(
          navigator.userAgent.match(/Android/i) ||
          navigator.userAgent.match(/iPhone/i) ||
          navigator.userAgent.match(/iPad/i) ||
          navigator.userAgent.match(/iPod/i)
        )
		}
		window.addEventListener("keydown", function(e) {
			if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1) {
				e.preventDefault();
			}
		}, false);

        fetch(romUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error("Failed to load ROM file: " + response.statusText);
                }
                return response.arrayBuffer();
            })
            .then(romBuffer => {
                embedGenesis({
                    container: "game-container",
                    name: "Project Zerp",
                    rom: romBuffer,
                    soundEnabled: true,
                    showMobileControls: isMobileDevice(),
					player1: {
                    up: "ArrowUp",
                    down: "ArrowDown",
                    left: "ArrowLeft",
                    right: "ArrowRight",
                    start: "Enter",
                    mode: "KeyG",
                    a: "KeyZ",
                    b: "KeyX",
                    c: "KeyC",
                  },
                });
            })
            .catch(error => {
                console.error("Emulator Initialization Error:", error);
                document.body.innerHTML = `<div style="color:white;text-align:center;padding-top:20%;">
                    <h3>Error loading game data</h3>
                    <p>${error.message}</p>
                </div>`;
            });
    </script>
</body>
</html>
